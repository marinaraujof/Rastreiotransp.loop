<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f3f4f6;
    font-family:Arial,sans-serif;
}

.card{
    width:90%;
    max-width:420px;
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.titulo{
    font-size:30px;
    font-weight:bold;
    color:#1f2937;
    margin-bottom:15px;
}

.check{
    font-size:65px;
    margin:10px;
}

.status{
    font-size:26px;
    font-weight:bold;
    color:#16a34a;
}

.mensagem{
    color:#6b7280;
    font-size:18px;
    margin:20px 0;
}

/* BARRA */
.barra{
    width:100%;
    height:14px;
    background:#e5e7eb;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progresso{
    width:20%;
    height:100%;
    background:#0057b8;
    border-radius:20px;
}

.info{
    text-align:left;
    color:#555;
    line-height:1.8;
    font-size:17px;
}

</style>
</head>

<body>

<div class="card">

<div class="titulo">
RASTREAMENTO LOOP
</div>

<div class="check">
☑️
</div>

<div class="status">
Liberação concluída
</div>

<div class="mensagem">
Processo em andamento para entrega.
</div>

<div class="barra">
    <div class="progresso"></div>
</div>

<div class="info">
<b>STATUS:</b> Liberado<br>
<b>ETAPA:</b> Rota de Entrega<br>
<b>PREVISÃO:</b> 03/07/2026
</div>

</div>

</body>
</html>
