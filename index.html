<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central de Liberação de Frota</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:650px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#0057b8;
    margin-bottom:25px;
}

.check{
    font-size:70px;
    margin:10px;
}

.status{
    font-size:34px;
    font-weight:bold;
    color:#16a34a;
    margin-bottom:15px;
}

.mensagem{
    color:#6b7280;
    font-size:18px;
    margin-bottom:30px;
}

/* Barra de progresso */
.barra{
    width:100%;
    height:14px;
    background:#e5e7eb;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:30px;
}

.progresso{
    width:20%;
    height:100%;
    background:#0057b8;
    border-radius:20px;
}

.info{
    text-align:left;
    color:#555;
    line-height:1.8;
    font-size:17px;
}

</style>

</head>

<body>

<div class="card">

    <div class="logo">
        RASTREAMENTO LOOP
    </div>

    <div class="check">
        ☑️
    </div>

    <div class="status">
        Liberação concluída
    </div>

    <div class="mensagem">
        Processo finalizado com sucesso.
    </div>


    <div class="barra">
        <div class="progresso"></div>
    </div>


    <div class="info">
        <b>STATUS:</b> Liberado<br>
        <b>ETAPA:</b> Rota de Entrega<br>
        <b>PREVISÃO:</b> 03/07/2026
    </div>

</div>

</body>
</html>
